name: Playwright Tests

# Trigger on pushes/PRs and allow manual suite selection.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api

# Least-privilege token scope for this workflow.
permissions:
  contents: read

# Cancel older in-progress runs for the same branch/PR to save CI minutes.
concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Playwright test pipeline split into two parallel jobs:
#   - ui-tests:  UI suite, sharded across 2 runners for speed.
#   - api-tests: API suite, single runner (lightweight).
jobs:

  # ─── UI Tests (sharded) ────────────────────────────────────────────────────
  # matrix.shard drives `--shard=N/2` so both halves run in parallel.
  # Skip this job when manually selecting 'api' only.
  ui-tests:
    name: UI Tests (shard ${{ matrix.shard }})
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'ui' || github.event.inputs.suite == 'all' }}
    strategy:
      fail-fast: false   # Don't cancel shard 2 if shard 1 fails.
      matrix:
        shard: [1/2, 2/2]
    steps:
    # Checkout the repository code.
    - uses: actions/checkout@v4
    # Setup Node.js and enable npm cache for faster installs.
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    # Install project dependencies from lockfile.
    - name: Install dependencies
      run: npm ci
    # Cache Playwright browser binaries to reduce repeated downloads.
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    # Install browser binaries and Linux dependencies needed by Playwright.
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # Prepare environment file only when an example file exists.
    - name: Create .env from .env.example (if available)
      shell: bash
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        fi
    # Run the UI suite for this shard slice only.
    # `matrix.shard` expands to e.g. "1/2", producing --shard=1/2.
    - name: Run UI tests (shard ${{ matrix.shard }})
      run: npx playwright test tests/ui --shard=${{ matrix.shard }}
    # Upload each shard's report under a unique name so they don't overwrite.
    - name: Upload UI report (shard ${{ matrix.shard }})
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-ui-report-${{ github.run_number }}-shard-${{ strategy.job-index }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30

  # ─── API Tests ─────────────────────────────────────────────────────────────
  # No sharding needed — API specs are fast and IO-bound, not CPU-bound.
  # Skip this job when manually selecting 'ui' only.
  api-tests:
    name: API Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite == 'api' || github.event.inputs.suite == 'all' }}
    steps:
    # Checkout the repository code.
    - uses: actions/checkout@v4
    # Setup Node.js and enable npm cache for faster installs.
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    # Install project dependencies from lockfile.
    - name: Install dependencies
      run: npm ci
    # Cache Playwright browser binaries to reduce repeated downloads.
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    # Install browser binaries and Linux dependencies needed by Playwright.
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # Prepare environment file only when an example file exists.
    - name: Create .env from .env.example (if available)
      shell: bash
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        fi
    # Run the full API suite (no sharding needed).
    - name: Run API tests
      run: npx playwright test tests/api
    # Upload the API report.
    - name: Upload API report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-api-report-${{ github.run_number }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30
